<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Smash Ultimate — Squad Stats</title>
<style>
  :root {
    --bg: #0e0f1a;
    --bg-2: #16182a;
    --panel: #1c1f36;
    --panel-2: #232746;
    --line: #2f3358;
    --text: #eef0ff;
    --muted: #9aa0c9;
    --red: #ff3b3b;
    --red-2: #ff6b5e;
    --gold: #ffca3a;
    --blue: #4cc9f0;
    --green: #57e389;
    --grad: linear-gradient(90deg, #ff3b3b, #ff6b5e);
    --grad-gold: linear-gradient(90deg, #ffca3a, #ffe08a);
    --shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 50% -200px, #23264a 0%, var(--bg) 60%);
    color: var(--text);
    font-family: "Segoe UI", Roboto, Helvetica, Arial, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 80px; }

  header.masthead { text-align: center; margin-bottom: 6px; }
  header.masthead h1 {
    margin: 0; font-size: clamp(28px, 5vw, 46px); font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
    background: var(--grad); -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 10px rgba(255, 59, 59, 0.35));
  }
  header.masthead .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .tabs { display: flex; gap: 8px; justify-content: center; margin: 22px 0 26px; flex-wrap: wrap; }
  .tab {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 10px 16px; border-radius: 999px; cursor: pointer; font-weight: 700;
    font-size: 15px; transition: all 0.15s ease; min-width: 150px; text-align: center; white-space: nowrap;
  }
  .tab:hover { color: var(--text); border-color: var(--red); }
  .tab.active {
    background: var(--grad); color: #fff; border-color: transparent;
    box-shadow: 0 6px 18px rgba(255, 59, 59, 0.35);
  }

  .view { display: none; animation: fade 0.25s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---- Controls ---- */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .controls label { color: var(--muted); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; min-width: 220px; outline: none;
  }
  select:focus { border-color: var(--red); }
  .stat-desc { color: var(--muted); font-size: 13px; margin-left: auto; }

  /* ---- Leaderboard rows ---- */
  .board { display: flex; flex-direction: column; gap: 8px; }
  .row {
    display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 14px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 16px; cursor: pointer; transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .row:hover { transform: translateX(4px); border-color: var(--red); }
  .rank { font-size: 20px; font-weight: 900; color: var(--muted); text-align: center; }
  .row.top1 .rank { color: var(--gold); }
  .row.top2 .rank { color: #d7dcff; }
  .row.top3 .rank { color: #e2965a; }
  .row.top1 { border-color: rgba(255, 202, 58, 0.6); box-shadow: 0 0 0 1px rgba(255, 202, 58, 0.25) inset; }

  .row-main { min-width: 0; }
  .row-name { font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 10px; min-width: 0; }
  .row-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge {
    width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
    font-size: 13px; font-weight: 900; color: #0e0f1a; flex-shrink: 0;
  }
  .bar-track { height: 8px; background: var(--panel-2); border-radius: 6px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: var(--grad); width: 0; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  .row.top1 .bar-fill { background: var(--grad-gold); }
  .value { font-size: 20px; font-weight: 900; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .value .unit { font-size: 12px; color: var(--muted); font-weight: 700; margin-left: 3px; }

  /* ---- Profiles ---- */
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .pcard {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 12px; cursor: pointer; transition: all 0.15s ease; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 132px;
  }
  .pcard:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: var(--shadow); }
  .pcard .badge { width: 46px; height: 46px; font-size: 18px; border-radius: 12px; margin: 0 0 10px; }
  .pcard .pname { font-weight: 800; font-size: 15px; line-height: 1.25; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pcard .pmeta { color: var(--muted); font-size: 12px; margin-top: 3px; }

  .back-btn {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 16px; cursor: pointer; font-weight: 700; margin-bottom: 18px;
  }
  .back-btn:hover { border-color: var(--red); }

  .phead { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
  .phead .badge { width: 64px; height: 64px; font-size: 26px; border-radius: 16px; }
  .phead h2 { margin: 0; font-size: 30px; font-weight: 900; }
  .phead .psub { color: var(--muted); font-size: 14px; margin-top: 2px; }

  .stat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .scard { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; min-height: 92px; }
  .scard .k { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .scard .v { font-size: 26px; font-weight: 900; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .scard .r { font-size: 12px; margin-top: 4px; font-weight: 700; }
  .r.good { color: var(--green); } .r.mid { color: var(--gold); } .r.bad { color: var(--red-2); }

  .section-title { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 8px 0 12px; }

  .mains { display: flex; flex-direction: column; gap: 8px; }
  .main-row {
    display: grid; grid-template-columns: 34px 1fr repeat(3, 70px); gap: 10px; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px;
  }
  .main-row.head { background: transparent; border: none; padding: 2px 14px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
  .main-row .cbadge { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center; font-size: 11px; font-weight: 900; color: #0e0f1a; position: relative; overflow: hidden; }
  .cbadge .cportrait { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .phead .mains-strip { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .phead .mains-strip .mlabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 2px; }
  .cportrait-lg { width: 46px; height: 46px; border-radius: 10px; object-fit: cover; background: var(--panel-2); border: 1px solid var(--line); }

  /* ---- Global controls bar ---- */
  .globalbar { display: flex; align-items: center; gap: 10px; justify-content: center; margin: -8px 0 22px; flex-wrap: wrap; }
  .ctrl-btn {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
    padding: 7px 16px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 13px;
    transition: all 0.15s ease; min-width: 140px; text-align: center; white-space: nowrap;
  }
  .ctrl-btn:hover { color: var(--text); border-color: var(--red); }
  .ctrl-btn.on { background: var(--panel-2); color: var(--gold); border-color: var(--gold); }
  .ctrl-note { color: var(--muted); font-size: 12px; }
  .filter-panel {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 22px; box-shadow: var(--shadow);
  }
  .filter-panel .fp-head { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .filter-panel .fp-head .mini { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
    border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .filter-panel .fp-head .mini:hover { color: var(--text); border-color: var(--red); }
  .fp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .fp-chip {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
    background: var(--panel-2); border: 1px solid var(--line); cursor: pointer; font-size: 13px; font-weight: 600;
    user-select: none; white-space: nowrap; overflow: hidden;
  }
  .fp-chip input { flex: none; }
  .fp-chip.off { opacity: 0.4; }
  .fp-chip input { accent-color: var(--red); }

  /* ---- Pie charts ---- */
  .pie-wrap { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
  .pie { flex: none; }
  .pie-legend { display: flex; flex-direction: column; gap: 5px; min-width: 150px; flex: 1; }
  .pie-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .pie-item .swatch { width: 11px; height: 11px; border-radius: 3px; flex: none; }
  .pie-item .pl-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pie-item .pl-val { color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 700; }
  .panel-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 620px) { .panel-cols { grid-template-columns: 1fr; } }

  /* ---- Character page ---- */
  .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .ccard { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 12px;
    cursor: pointer; transition: all 0.15s ease; text-align: center;
    display: flex; flex-direction: column; align-items: center; min-height: 142px; }
  .ccard:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: var(--shadow); }
  .ccard img { width: 60px; height: 54px; object-fit: cover; border-radius: 8px; background: var(--panel-2);
    border: 1px solid var(--line); flex: none; }
  .ccard .cn { font-weight: 700; font-size: 13px; margin-top: 8px; line-height: 1.25; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .ccard .cm { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .chead-img { width: 72px; height: 64px; object-fit: cover; border-radius: 14px; border: 1px solid var(--line); background: var(--panel-2); }
  .best-list { display: flex; flex-direction: column; gap: 6px; }
  .best-row { display: grid; grid-template-columns: 26px 1fr auto; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; }
  .best-row .badge { width: 24px; height: 24px; border-radius: 7px; display: grid; place-items: center; font-size: 10px; font-weight: 900; color: #0e0f1a; }
  .best-row .bn { font-weight: 700; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .best-row .bv { font-weight: 900; font-variant-numeric: tabular-nums; }
  .subhead { font-size: 13px; font-weight: 800; color: var(--muted); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .main-row .cname { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .main-row .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 14px; }
  .main-row .num small { color: var(--muted); font-weight: 600; }
  .main-row .num.lowsample { color: var(--muted); opacity: 0.45; }
  .main-row.zero { opacity: 0.4; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
  @media (max-width: 560px) {
    .stat-desc { display: none; }
    .main-row { grid-template-columns: 30px 1fr repeat(3, 54px); }
  }
</style>
</head>

<div class="wrap">
  <header class="masthead">
    <h1>Squad Smash Stats</h1>
    <div class="sub" id="subtitle"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="leaderboards">🏆 Leaderboards</button>

  <div class="globalbar">
    <button class="ctrl-btn" id="weightBtn" title="Weighted adjusts rates for sample size so a fighter played once can't top a list. Raw shows unadjusted numbers."></button>
    <button class="ctrl-btn" id="filterBtn">🔎 Filter players</button>
    <span class="ctrl-note" id="filterSummary"></span>

  <div class="filter-panel" id="filterPanel" style="display:none"></div>

  <!-- LEADERBOARDS -->
  <section class="view active" id="view-leaderboards">
    <div class="controls">
      <label for="statSelect">Rank by</label>
      <select id="statSelect"></select>
      <span class="stat-desc" id="statDesc"></span>
    </div>
    <div class="board" id="board"></div>
  </section>

  <!-- PROFILES -->
  <section class="view" id="view-profiles">
    <div id="profileList"></div>
    <div id="profileDetail" style="display:none"></div>
  </section>

  <!-- CHARACTERS -->
  <section class="view" id="view-characters">
    <div id="charList"></div>
    <div id="charDetail" style="display:none"></div>
  </section>

  <footer id="footer"></footer>
</div>

    { group: "Journey", label: "🎁 Items Grabbed",     src: "totals", key: "Items Grabbed",     unit: "", hib: true },
    { group: "Journey", label: "⏱️ Play Time",         src: "totals", key: "Play Time",         unit: "hrs", hib: true },
  ];

  // ---- helpers ----
  var PALETTE = ["#ff3b3b","#4cc9f0","#ffca3a","#57e389","#b388ff","#ff8fab",
                 "#ff9f1c","#2ec4b6","#e07a5f","#8ac926","#00bbf9","#f15bb5"];
  function colorFor(name) {
    var h = 0;
    for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }
  function initials(name) {
    var clean = name.replace(/[^a-zA-Z0-9 ]/g, " ").trim();
    var parts = clean.split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return clean.slice(0, 2).toUpperCase();
  }
  function badge(name, cls) {
    var c = colorFor(name);
    return '<span class="' + (cls || "badge") + '" style="background:' + c + '">' + initials(name) + '</span>';
  }
  // A fighter badge: the official portrait, with the initials badge showing
  // through if the image is missing (onerror removes the <img>).
  function charBadge(name) {
    var c = colorFor(name);
    return '<span class="cbadge" style="background:' + c + '">' + initials(name) +
      '<img class="cportrait" src="portraits/' + encodeURIComponent(name) +
      '.png" alt="" onerror="this.remove()"></span>';
  }
  function fmt(v, unit) {
    if (v == null || isNaN(v)) return "—";
    var n = v;
    if (unit === "hrs") n = v / 60; // Play Time stored in minutes
    var out;
    if (Math.abs(n) >= 1000000) out = (n / 1000000).toFixed(1) + "M";
    else if (Math.abs(n) >= 10000) out = (n / 1000).toFixed(1) + "K";
    else if (Number.isInteger(n)) out = n.toLocaleString();
    else out = n.toFixed(unit === "hrs" ? 1 : 2).replace(/\.00$/, "");
    return out;
  }
  function getStatVal(p, stat) {
    var bucket = stat.src === "derived" ? p.derived : p.totals;
    return bucket ? bucket[stat.key] : undefined;
  }
  function ordinal(n) {
    var s = ["th", "st", "nd", "rd"], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
  function scard(label, valHtml, extra) {
    return '<div class="scard"><div class="k">' + label + '</div><div class="v">' + valHtml + '</div>' + (extra || "") + '</div>';
  }

  // ---- pie charts (inline SVG, no library) ----
  var PIE_PAL = ["#ff3b3b", "#4cc9f0", "#ffca3a", "#57e389", "#b388ff", "#ff8fab",
    "#ff9f1c", "#2ec4b6", "#e07a5f", "#8ac926", "#00bbf9", "#f15bb5"];
  function pieSVG(segs, size) {
    size = size || 150;
    var total = segs.reduce(function (s, x) { return s + x.value; }, 0);
    if (!total) return "";
    var r = size / 2, ang = -Math.PI / 2, paths = "";
    segs.forEach(function (seg) {
      var frac = seg.value / total;
      if (frac <= 0) return;
      if (frac >= 0.9999) { paths += '<circle cx="' + r + '" cy="' + r + '" r="' + r + '" fill="' + seg.color + '"/>'; return; }
      var a2 = ang + frac * 2 * Math.PI;
      var x1 = r + r * Math.cos(ang), y1 = r + r * Math.sin(ang);
      var x2 = r + r * Math.cos(a2), y2 = r + r * Math.sin(a2);
      var large = frac > 0.5 ? 1 : 0;
      paths += '<path d="M' + r + ',' + r + ' L' + x1.toFixed(2) + ',' + y1.toFixed(2) +
        ' A' + r + ',' + r + ' 0 ' + large + ' 1 ' + x2.toFixed(2) + ',' + y2.toFixed(2) + ' Z" fill="' + seg.color + '"/>';
      ang = a2;
    });
    return '<svg class="pie" viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' + paths + '</svg>';
  }
  function pieLegend(segs) {
    var total = segs.reduce(function (s, x) { return s + x.value; }, 0) || 1;
    return '<div class="pie-legend">' + segs.map(function (s) {
      return '<div class="pie-item"><span class="swatch" style="background:' + s.color + '"></span>' +
        '<span class="pl-label">' + s.label + '</span><span class="pl-val">' + Math.round(s.value / total * 100) + '%</span></div>';
    }).join("") + "</div>";
  }
  function topSegments(entries, n, colorFn) {
    entries = entries.filter(function (e) { return e.value > 0; }).sort(function (a, b) { return b.value - a.value; });
    var segs = entries.slice(0, n).map(function (e, i) { return { label: e.label, value: e.value, color: colorFn(e.label, i) }; });
    var other = entries.slice(n).reduce(function (s, e) { return s + e.value; }, 0);
    if (other > 0) segs.push({ label: "Other", value: other, color: "#3a3f63" });
    return segs;
  }
  function pieBlock(segs) {
    return segs.length ? '<div class="pie-wrap">' + pieSVG(segs, 150) + pieLegend(segs) + "</div>" : '<div class="ctrl-note">No data</div>';
  }

  // ================= LEADERBOARDS =================
  var statSelect = document.getElementById("statSelect");
  (function buildDropdown() {
    var groups = {};
    STATS.forEach(function (s, i) {
      (groups[s.group] = groups[s.group] || []).push({ s: s, i: i });
    });
    Object.keys(groups).forEach(function (g) {
      var og = document.createElement("optgroup");
      og.label = g;
      groups[g].forEach(function (o) {
        var opt = document.createElement("option");
        opt.value = String(o.i);
        opt.textContent = o.s.label;
        og.appendChild(opt);
      });
      statSelect.appendChild(og);
    });
  })();

  function renderBoard() {
    var stat = STATS[parseInt(statSelect.value, 10)];

    var pool = visiblePlayers();
    var eligible = pool.filter(function (p) { return qualifies(p, stat); });
    var belowCut = pool.length - eligible.length;

    var desc = stat.hib ? "Higher is better" : "Lower is better — top = most";
    if (stat.rate) {
      desc += (weightMode ? " · weighted" : " · raw") + " · min " + MIN_BATTLES + " battles" +
        (belowCut ? " (" + belowCut + " below cutoff)" : "");
    }
    document.getElementById("statDesc").textContent = desc;

    var rows = eligible
      .map(function (p) { return { p: p, v: statVal(p, stat) }; })
      .filter(function (r) { return r.v != null && !isNaN(r.v); })
      .sort(function (a, b) { return b.v - a.v; });

    var max = rows.length ? Math.max.apply(null, rows.map(function (r) { return Math.abs(r.v); })) : 1;
    var board = document.getElementById("board");
    board.innerHTML = rows.map(function (r, idx) {
      var rank = idx + 1;
      var topCls = rank <= 3 ? " top" + rank : "";
      var pct = max ? Math.max(2, Math.abs(r.v) / max * 100) : 0;
      var displayUnit = (stat.unit === "hrs") ? " hrs" : (stat.unit ? stat.unit : "");
      return (
        '<div class="row' + topCls + '" data-player="' + encodeURIComponent(r.p.name) + '">' +
          '<div class="rank">' + rank + '</div>' +
          '<div class="row-main">' +
            '<div class="row-name">' + badge(r.p.name) + '<span>' + r.p.name + '</span></div>' +
            '<div class="bar-track"><div class="bar-fill" data-w="' + pct + '"></div></div>' +
          '</div>' +
          '<div class="value">' + fmt(r.v, stat.unit) + '<span class="unit">' + displayUnit + '</span></div>' +
        '</div>'
      );
    }).join("");

    // animate bars
    requestAnimationFrame(function () {
      board.querySelectorAll(".bar-fill").forEach(function (el) {
        el.style.width = el.getAttribute("data-w") + "%";
      });
    });

    board.querySelectorAll(".row").forEach(function (row) {
      row.addEventListener("click", function () {
        openProfile(decodeURIComponent(row.getAttribute("data-player")));
      });
    });
  }
  statSelect.addEventListener("change", renderBoard);

  // ================= PROFILES =================
  var profileList = document.getElementById("profileList");
  var profileDetail = document.getElementById("profileDetail");
  var openProfileName = null;

  function renderProfileList() {
    var sorted = visiblePlayers().slice().sort(function (a, b) {
      return (b.totals.Battles || 0) - (a.totals.Battles || 0);
    });
    profileList.innerHTML =
      '<div class="section-title">Tap a player</div><div class="profile-grid">' +
      sorted.map(function (p) {
        return (
          '<div class="pcard" data-player="' + encodeURIComponent(p.name) + '">' +
            badge(p.name) +
            '<div class="pname">' + p.name + '</div>' +
            '<div class="pmeta">' + fmt(p.totals.Battles, "") + ' battles</div>' +
          '</div>'
        );
      }).join("") + "</div>";
    profileList.querySelectorAll(".pcard").forEach(function (c) {
      c.addEventListener("click", function () {
        openProfile(decodeURIComponent(c.getAttribute("data-player")));
      });
    });
  }

  // rank of a player within the group for a given stat key
  function rankIn(player, stat) {
    var vals = visiblePlayers().filter(function (p) { return qualifies(p, stat); })
      .map(function (p) { return { n: p.name, v: statVal(p, stat) }; })
      .filter(function (x) { return x.v != null && !isNaN(x.v); })
      .sort(function (a, b) { return stat.hib ? b.v - a.v : a.v - b.v; });
    for (var i = 0; i < vals.length; i++) if (vals[i].n === player.name) return { rank: i + 1, of: vals.length };
    return null;
  }

  function ratingClass(rank, of) {
    var q = rank / of;
    if (q <= 0.34) return "good";
    if (q <= 0.67) return "mid";
    return "bad";
  }

  function openProfile(name, silent) {
    var p = DB.players[name];
    if (!p) return;
    openProfileName = name;
    if (!silent) { setTab("profiles"); window.scrollTo({ top: 0, behavior: "smooth" }); }
    profileList.style.display = "none";
    profileDetail.style.display = "block";

    var headline = [
      { label: "Battles",   stat: STATS.find(function (s) { return s.key === "Battles"; }) },
      { label: "Win Rate",  stat: STATS.find(function (s) { return s.key === "Win Rate"; }) },
      { label: "Total KOs", stat: STATS.find(function (s) { return s.key === "KOs"; }) },
      { label: "K/D Ratio", stat: STATS.find(function (s) { return s.key === "K/D Ratio"; }) },
      { label: "Damage Ratio", stat: STATS.find(function (s) { return s.key === "Damage Ratio"; }) },
      { label: "Peak Damage",  stat: STATS.find(function (s) { return s.key === "Peak Damage"; }) },
    ];

    var cards = headline.map(function (h) {
      var v = statVal(p, h.stat);
      var r = rankIn(p, h.stat);
      var rc = r ? ratingClass(r.rank, r.of) : "mid";
      var unit = h.stat.unit === "hrs" ? " hrs" : h.stat.unit;
      return (
        '<div class="scard">' +
          '<div class="k">' + h.label + '</div>' +
          '<div class="v">' + fmt(v, h.stat.unit) + (unit ? '<span style="font-size:14px;color:var(--muted)"> ' + unit + '</span>' : '') + '</div>' +
          (r ? '<div class="r ' + rc + '">' + ordinal(r.rank) + ' of ' + r.of + '</div>' : '') +
        '</div>'
      );
    }).join("");

    // Fighters by battles; per-fighter Win% shrinks toward the player's overall
    // rate when weighting is on, so a 1-game fighter can't show a fluke 100%.
    var pWR = (p.derived && p.derived["Win Rate"]) || 0;
    var allChars = Object.keys(p.characters || {}).map(function (c) {
      var d = p.characters[c];
      var rawWr = d.battles ? (d.victories || 0) / d.battles * 100 : 0;
      return {
        name: c, battles: d.battles || 0, kos: d.kos || 0, victories: d.victories || 0,
        wr: weightMode ? shrink(rawWr, d.battles || 0, pWR) : rawWr,
      };
    }).sort(function (a, b) { return b.battles - a.battles; });
    var chars = allChars.slice(0, 8);

    var mainRows =
      '<div class="main-row head"><span></span><span>Fighter</span>' +
      '<span class="num">Battles</span><span class="num">KOs</span><span class="num">Win %</span></div>' +
      chars.map(function (c) {
        return (
          '<div class="main-row">' +
            charBadge(c.name) +
            '<span class="cname">' + c.name + '</span>' +
            '<span class="num">' + fmt(c.battles, "") + '</span>' +
            '<span class="num">' + fmt(c.kos, "") + '</span>' +
            (c.battles
              ? '<span class="num' + (c.battles < MIN_FIGHTER_BATTLES ? ' lowsample" title="only ' + c.battles + (c.battles === 1 ? ' battle' : ' battles') : '') + '">' + c.wr.toFixed(0) + '<small>%</small></span>'
              : '<span class="num">—</span>') +
          '</div>'
        );
      }).join("");

    var mainsStrip = chars.length
      ? '<div class="mains-strip"><span class="mlabel">Mains</span>' +
          chars.slice(0, 3).map(function (c) {
            return '<img class="cportrait-lg" title="' + c.name + '" alt="' + c.name +
              '" src="portraits/' + encodeURIComponent(c.name) + '.png" ' +
              'onerror="this.style.display=\'none\'">';
          }).join("") +
        '</div>'
      : '';

    var KO_TYPES = [["KOs_ Smash Attack", "Smash"], ["KOs_ Special Move", "Special"],
      ["KOs_ Air Attack", "Air"], ["KOs_ Throw", "Throw"], ["KOs_ Tilt Attack", "Tilt"],
      ["KOs_ Meteor Smash", "Meteor"], ["KOs_ Item", "Item"], ["KOs_ Final Smash", "Final Smash"],
      ["KOs_ Other", "Other"]];
    var koSegs = KO_TYPES.map(function (kt, i) {
      return { label: kt[1], value: (p.totals[kt[0]] || 0), color: PIE_PAL[i % PIE_PAL.length] };
    }).filter(function (s) { return s.value > 0; });
    var usageSegs = topSegments(allChars.map(function (c) {
      return { label: c.name, value: c.battles };
    }), 8, function (l, i) { return PIE_PAL[i % PIE_PAL.length]; });

    profileDetail.innerHTML =
      '<button class="back-btn" id="backBtn">← All players</button>' +
      '<div class="phead">' + badge(p.name) +
        '<div><h2>' + p.name + '</h2><div class="psub">' +
          fmt(p.totals.Battles, "") + ' battles · ' +
          fmt(p.totals["Victories _Smash Mode"], "") + ' wins · ' +
          fmt(p.totals["Play Time"], "hrs") + ' hrs played' +
        '</div></div>' +
        mainsStrip +
      '</div>' +
      '<div class="stat-cards">' + cards + '</div>' +
      '<div class="section-title">Most-Played Fighters</div>' +
      '<div class="mains">' + mainRows + '</div>' +
      '<div class="section-title">Breakdown</div>' +
      '<div class="panel-cols">' +
        '<div><div class="subhead">KO types</div>' + pieBlock(koSegs) + '</div>' +
        '<div><div class="subhead">Fighter usage</div>' + pieBlock(usageSegs) + '</div>' +
      '</div>';

    document.getElementById("backBtn").addEventListener("click", function () {
      openProfileName = null;
      profileDetail.style.display = "none";
      profileList.style.display = "block";
    });
  }

  // ================= CHARACTERS =================
  var charList = document.getElementById("charList");
  var charDetail = document.getElementById("charDetail");
  var openCharName = null;
  var charIndex = null;

  function buildCharIndex() {
    var idx = {};
    visiblePlayers().forEach(function (p) {
      var chars = p.characters || {};
      Object.keys(chars).forEach(function (c) {
        var d = chars[c];
        if (!idx[c]) idx[c] = { name: c, battles: 0, kos: 0, victories: 0, falls: 0, players: [] };
        var e = idx[c];
        e.battles += d.battles || 0; e.kos += d.kos || 0;
        e.victories += d.victories || 0; e.falls += d.falls || 0;
        e.players.push({ name: p.name, battles: d.battles || 0, kos: d.kos || 0, victories: d.victories || 0, falls: d.falls || 0 });
      });
    });
    return (charIndex = idx);
  }
  function getCharIndex() { return charIndex || buildCharIndex(); }

  function renderCharList() {
    var idx = getCharIndex();
    var arr = Object.keys(idx).map(function (k) { return idx[k]; })
      .filter(function (c) { return c.battles > 0; })
      .sort(function (a, b) { return b.battles - a.battles; });
    charList.innerHTML =
      '<div class="section-title">Tap a fighter · ' + arr.length + ' played</div><div class="char-grid">' +
      arr.map(function (c) {
        return '<div class="ccard" data-char="' + encodeURIComponent(c.name) + '">' +
          '<img src="portraits/' + encodeURIComponent(c.name) + '.png" alt="' + c.name + '" onerror="this.style.visibility=\'hidden\'">' +
          '<div class="cn">' + c.name + '</div><div class="cm">' + fmt(c.battles, "") + ' battles</div></div>';
      }).join("") + "</div>";
    charList.querySelectorAll(".ccard").forEach(function (el) {
      el.addEventListener("click", function () { openCharacter(decodeURIComponent(el.getAttribute("data-char"))); });
    });
  }

  function openCharacter(name, silent) {
    var c = getCharIndex()[name];
    if (!c) return;
    openCharName = name;
    if (!silent) { setTab("characters"); window.scrollTo({ top: 0, behavior: "smooth" }); }
    charList.style.display = "none";
    charDetail.style.display = "block";

    // Only players who actually played this fighter (battles > 0) count toward
    // its stats; 0-battle rows are OCR artifacts (a stray KO with no recorded
    // battles) — shown greyed in the list but excluded from every aggregate.
    var qual = c.players.filter(function (pl) { return pl.battles > 0; });
    var totB = qual.reduce(function (s, pl) { return s + pl.battles; }, 0);
    var totK = qual.reduce(function (s, pl) { return s + pl.kos; }, 0);
    var totV = qual.reduce(function (s, pl) { return s + pl.victories; }, 0);
    var totF = qual.reduce(function (s, pl) { return s + pl.falls; }, 0);
    var grpWR = totB ? totV / totB * 100 : 0;
    var grpKD = totF ? totK / totF : 0;

    var byBattles = c.players.slice().sort(function (a, b) { return b.battles - a.battles; });
    var playedRows =
      '<div class="main-row head"><span></span><span>Player</span>' +
      '<span class="num">Battles</span><span class="num">KOs</span><span class="num">Win %</span></div>' +
      byBattles.map(function (pl) {
        var zero = pl.battles <= 0;
        var rawWr = pl.battles ? pl.victories / pl.battles * 100 : 0;
        var wr = weightMode ? shrink(rawWr, pl.battles, grpWR) : rawWr;
        var low = !zero && pl.battles < MIN_FIGHTER_BATTLES;
        return '<div class="main-row' + (zero ? " zero" : "") + '">' + badge(pl.name, "cbadge") +
          '<span class="cname">' + pl.name + '</span>' +
          '<span class="num">' + fmt(pl.battles, "") + '</span>' +
          '<span class="num">' + fmt(pl.kos, "") + '</span>' +
          '<span class="num' + (low ? " lowsample" : "") + '">' + (zero ? "—" : wr.toFixed(0) + '<small>%</small>') + '</span></div>';
      }).join("");

    // Best players with this fighter — shrunk toward the fighter's group rate,
    // so a one-game 100% can't win.
    function bestBy(rateFn, prior, fmtV) {
      var pool = qual.filter(function (pl) { return pl.battles >= MIN_FIGHTER_BATTLES; });
      var rows = pool.map(function (pl) {
        var raw = rateFn(pl);
        return { name: pl.name, val: weightMode ? shrink(raw, pl.battles, prior) : raw };
      }).sort(function (a, b) { return b.val - a.val; }).slice(0, 3).map(function (x) {
        return '<div class="best-row">' + badge(x.name, "badge") +
          '<span class="bn">' + x.name + '</span><span class="bv">' + fmtV(x.val) + '</span></div>';
      }).join("");
      return rows || '<div class="ctrl-note">No players with ' + MIN_FIGHTER_BATTLES + '+ battles</div>';
    }
    var bestWR = bestBy(function (pl) { return pl.battles ? pl.victories / pl.battles * 100 : 0; }, grpWR, function (v) { return v.toFixed(0) + "%"; });
    var bestKD = bestBy(function (pl) { return pl.falls ? pl.kos / pl.falls : 0; }, grpKD, function (v) { return v.toFixed(2); });

    var usageSegs = topSegments(qual.map(function (pl) { return { label: pl.name, value: pl.battles }; }), 8,
      function (l) { return colorFor(l); });
    var adj = weightMode ? " (adjusted)" : "";
    var bestNote = " · min " + MIN_FIGHTER_BATTLES + " matches";

    charDetail.innerHTML =
      '<button class="back-btn" id="charBack">← All fighters</button>' +
      '<div class="phead"><img src="portraits/' + encodeURIComponent(name) + '.png" alt="' + name +
        '" class="chead-img" onerror="this.style.display=\'none\'">' +
        '<div><h2>' + name + '</h2><div class="psub">' + fmt(totB, "") + ' battles · ' +
        qual.length + ' player' + (qual.length === 1 ? "" : "s") + '</div></div></div>' +
      '<div class="stat-cards">' +
        scard("Total Battles", fmt(totB, "")) +
        scard("Total KOs", fmt(totK, "")) +
        scard("Group Win Rate", grpWR.toFixed(1) + "%") +
      '</div>' +
      '<div class="panel-cols">' +
        '<div><div class="subhead">Usage share</div>' + pieBlock(usageSegs) + '</div>' +
        '<div><div class="subhead">Best win rate' + adj + bestNote + '</div><div class="best-list">' + bestWR + '</div>' +
          '<div class="subhead" style="margin-top:14px">Best K/D' + adj + bestNote + '</div><div class="best-list">' + bestKD + '</div></div>' +
      '</div>' +
      '<div class="section-title">Played Most By</div><div class="mains">' + playedRows + '</div>';

    document.getElementById("charBack").addEventListener("click", function () {
      openCharName = null; charDetail.style.display = "none"; charList.style.display = "block";
    });
  }

  // ================= TABS =================
  function setTab(view) {
    document.querySelectorAll(".tab").forEach(function (t) {
      t.classList.toggle("active", t.getAttribute("data-view") === view);
    });
    document.querySelectorAll(".view").forEach(function (v) {
      v.classList.toggle("active", v.id === "view-" + view);
    });
    if (view === "profiles" && profileDetail.style.display !== "block") {
      profileList.style.display = "block";
    }
    if (view === "characters" && charDetail.style.display !== "block") {
      charList.style.display = "block";
    }
  }
  // Clicking a tab returns it to its top-level "home": the leaderboard resets
  // to the default stat, and Players/Characters drop any open detail and show
  // their grid. Global controls (Weighted toggle, player filter) are NOT reset.
  function goHome(view) {
    if (view === "leaderboards") {
      statSelect.value = "0";
      renderBoard();
    } else if (view === "profiles") {
      openProfileName = null;
      profileDetail.style.display = "none";
      profileList.style.display = "block";
    } else if (view === "characters") {
      openCharName = null;
      charDetail.style.display = "none";
      charList.style.display = "block";
    }
  }
  document.querySelectorAll(".tab").forEach(function (t) {
    t.addEventListener("click", function () {
      var v = t.getAttribute("data-view");
      goHome(v);
      setTab(v);
    });
  });

  // ================= CONTROLS (weighting + player filter) =================
  function isActive(view) { return document.getElementById("view-" + view).classList.contains("active"); }

  // Re-render everything in place; re-open an open detail without switching tabs.
  function refresh() {
    renderBoard();
    renderProfileList();
    renderCharList();
    if (openProfileName != null && DB.players[openProfileName] && !hidden.has(openProfileName) && profileDetail.style.display === "block") {
      openProfile(openProfileName, true);
    } else if (openProfileName != null) {
      openProfileName = null; profileDetail.style.display = "none";
      if (isActive("profiles")) profileList.style.display = "block";
    }
    if (openCharName != null && getCharIndex()[openCharName] && charDetail.style.display === "block") {
      openCharacter(openCharName, true);
    } else if (openCharName != null) {
      openCharName = null; charDetail.style.display = "none";
      if (isActive("characters")) charList.style.display = "block";
    }
  }

  var weightBtn = document.getElementById("weightBtn");
  function syncWeightBtn() {
    weightBtn.textContent = weightMode ? "⚖️ Weighted" : "⚖️ Raw";
    weightBtn.classList.toggle("on", weightMode);
  }
  weightBtn.addEventListener("click", function () {
    weightMode = !weightMode; persist(); syncWeightBtn(); refresh();
  });

  var filterBtn = document.getElementById("filterBtn");
  var filterPanel = document.getElementById("filterPanel");
  function updateFilterSummary() {
    document.getElementById("filterSummary").textContent = hidden.size ? hidden.size + " hidden" : "";
  }
  function onFilterChange() {
    persist(); priorCache = {}; charIndex = null; updateFilterSummary(); refresh();
  }
  function renderFilterPanel() {
    filterPanel.innerHTML =
      '<div class="fp-head"><strong>Show players</strong>' +
        '<button class="mini" data-act="all">All</button><button class="mini" data-act="none">None</button></div>' +
      '<div class="fp-grid">' +
      players.slice().sort(function (a, b) { return a.name.localeCompare(b.name); }).map(function (p) {
        var on = !hidden.has(p.name);
        return '<label class="fp-chip' + (on ? "" : " off") + '"><input type="checkbox" data-player="' +
          encodeURIComponent(p.name) + '"' + (on ? " checked" : "") + ">" + p.name + "</label>";
      }).join("") + "</div>";
    filterPanel.querySelectorAll("input[type=checkbox]").forEach(function (cb) {
      cb.addEventListener("change", function () {
        var nm = decodeURIComponent(cb.getAttribute("data-player"));
        if (cb.checked) hidden.delete(nm); else hidden.add(nm);
        cb.parentNode.classList.toggle("off", !cb.checked);
        onFilterChange();
      });
    });
    filterPanel.querySelectorAll(".mini").forEach(function (b) {
      b.addEventListener("click", function () {
        if (b.getAttribute("data-act") === "all") hidden.clear();
        else players.forEach(function (p) { hidden.add(p.name); });
        renderFilterPanel(); onFilterChange();
      });
    });
  }
  filterBtn.addEventListener("click", function () {
    var show = filterPanel.style.display === "none";
    filterPanel.style.display = show ? "block" : "none";
    if (show) renderFilterPanel();
  });

  // ================= INIT =================
  document.getElementById("subtitle").textContent =
    players.length + " players · Super Smash Bros. Ultimate";
  document.getElementById("footer").textContent =
    "Built from " + (DB.generatedFrom || 0) + " stat sheets · read_value as recorded (OCR).";
  statSelect.value = "0";
  syncWeightBtn();
  updateFilterSummary();
  renderBoard();
  renderProfileList();
  renderCharList();
})();
</script>
</body>
</html>
